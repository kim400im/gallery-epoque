// Status is derived purely from today's date — no manual field needed
const getExhibitionStatus = (ex) => {
  const today = new Date();
  const start = new Date(ex.startDate);
  const end   = new Date(ex.endDate);
  if (today >= start && today <= end) return 'current';
  if (today < start) return 'upcoming';
  return 'past';
};

const fmtDate = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
};

// Generate placeholder works for an exhibition based on its color/style
const makeExhibitionWorks = (ex) => {
  const count = Math.min(ex.works || 8, 12);
  const palettes = [
    ['#4A7C59','#1A4D2E'], ['#8FB8C8','#2A4D66'], ['#C9A84C','#8B6B1A'],
    ['#A8C99A','#4A7C59'], ['#8C8679','#3A3A37'], ['#6A9E78','#235E39'],
    ['#3A3360','#0D0B1A'], ['#5C5750','#1A1A18'], ['#E2C97A','#C9A84C'],
    ['#D4E8CB','#7FB069'], ['#2E7048','#0E2D1A'], ['#7FB069','#235E39'],
  ];
  const mediums = ['Silver gelatin print','Archival pigment print','Oil on linen','Silkscreen print','Watercolour on paper','Charcoal on cotton rag','Cyanotype','Gouache on board'];
  const dims = ['30×40 cm','40×60 cm','50×70 cm','60×80 cm','80×100 cm','50×50 cm','70×90 cm','35×45 cm'];
  return Array.from({ length: count }, (_, i) => {
    const [c1, c2] = palettes[i % palettes.length];
    return {
      id: i+1,
      title: `${ex.title}, No. ${i+1}`,
      medium: mediums[i % mediums.length],
      catalog: `GE-EX${ex.id}-${String(i+1).padStart(3,'0')}`,
      price: `€ ${(Math.floor(Math.random()*30+5)*100).toLocaleString()}`,
      dimensions: dims[i % dims.length],
      bg: `linear-gradient(${130+i*15}deg, ${c1}, ${c2})`,
      status: i === 2 ? 'sold' : 'available',
      featured: i === 0,
    };
  });
};

  });

  const byStatus = {
    current:  exhibitions.filter(e => getExhibitionStatus(e) === 'current'),
    upcoming: exhibitions.filter(e => getExhibitionStatus(e) === 'upcoming'),
    past:     exhibitions.filter(e => getExhibitionStatus(e) === 'past'),
  };

  const TABS = [
    { id:'current',  label:'Current',  count: byStatus.current.length },
    { id:'upcoming', label:'Upcoming', count: byStatus.upcoming.length },
    { id:'past',     label:'Past',     count: byStatus.past.length },
  ];

  const shown = byStatus[tab];

  return (
    <div style={{ background:'#F7F4EF', minHeight:'60vh' }}>
      {/* Page header */}
      <div style={{ background:'#1A1A18', padding:'72px 40px 0' }}>
        <div style={{ maxWidth:'1280px', margin:'0 auto' }}>
          <div style={{ fontSize:'11px', fontWeight:600, letterSpacing:'0.14em', textTransform:'uppercase', color:'#C9A84C', marginBottom:'12px' }}>Programme</div>
          <h1 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'clamp(40px,6vw,72px)', fontWeight:300, color:'white', letterSpacing:'-0.02em', lineHeight:1.05, marginBottom:'40px' }}>Exhibitions</h1>

          {/* Tabs */}
          <div style={{ display:'flex', gap:'0', borderBottom:'1px solid rgba(255,255,255,0.1)' }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{
                  fontFamily:"'Jost',sans-serif", fontSize:'13px', fontWeight:500, letterSpacing:'0.04em',
                  background:'transparent', border:'none', color: tab===t.id ? 'white' : 'rgba(255,255,255,0.4)',
                  padding:'14px 28px 16px', cursor:'pointer', position:'relative',
                  borderBottom: tab===t.id ? '2px solid #C9A84C' : '2px solid transparent',
                  marginBottom:'-1px', transition:'color 200ms',
                }}>
                {t.label}
                {t.count > 0 && <span style={{ marginLeft:'8px', fontSize:'10px', fontWeight:600, background: tab===t.id ? '#C9A84C' : 'rgba(255,255,255,0.15)', color: tab===t.id ? '#1A1A18' : 'rgba(255,255,255,0.5)', padding:'2px 7px', borderRadius:'999px' }}>{t.count}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth:'1280px', margin:'0 auto', padding:'48px 40px 80px' }}>
        {shown.length === 0 ? (
          <div style={{ padding:'80px 0', textAlign:'center' }}>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'28px', fontWeight:300, color:'#C4BFB8', fontStyle:'italic' }}>No {tab} exhibitions</div>
            <p style={{ fontFamily:"'Jost',sans-serif", fontSize:'13px', color:'#C4BFB8', marginTop:'10px' }}>Check back soon for updates.</p>
          </div>
        ) : tab === 'current' ? (
          <div style={{ display:'flex', flexDirection:'column', gap:'20px' }}>
            {shown.map(ex => <ExhibitionCard key={ex.id} ex={ex} size="hero" onNavigate={onNavigate} />)}
          </div>
        ) : (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'20px' }}>
            {shown.map(ex => <ExhibitionCard key={ex.id} ex={ex} onNavigate={onNavigate} />)}
          </div>
        )}
      </div>
    </div>
  );
};

// ── Root App ─────────────────────────────────────────────────

const App = () => {
  const [screen, setScreen] = React.useState('home');
  const [selectedWork, setSelectedWork] = React.useState(null);
  const [contactWork, setContactWork] = React.useState(null);
  const [exhibitions, setExhibitions] = React.useState(EXHIBITIONS_DATA_INIT);

  window.__navigate = setScreen;
  window.__exhibitions = exhibitions;
  window.__setExhibitions = setExhibitions;

  const navigate = React.useCallback((s) => {
    setScreen(s);
    setSelectedWork(null);
  }, []);

  const handleArtworkClick = (work) => setSelectedWork(work);
  const handleContact = () => {
    setContactWork(selectedWork);
    setSelectedWork(null);
    setScreen('contact');
  };

  return (
    <div>
      <Header currentScreen={screen} onNavigate={navigate} />

      {selectedWork && (
        <ArtworkDetail
          work={selectedWork}
          onClose={() => setSelectedWork(null)}
          onContact={handleContact}
        />
      )}

      {screen === 'home' && (
        <>
          <HeroSection onNavigate={navigate} />
          <CurrentExhibitionStrip exhibitions={exhibitions} onNavigate={navigate} />
          <FeaturedStrip onArtworkClick={handleArtworkClick} />
          <AboutStrip />
          <ContactSection onBack={() => navigate('home')} />
        </>
      )}

      {screen === 'gallery' && (
        <GalleryGrid onArtworkClick={handleArtworkClick} />
      )}

      {screen === 'contact' && (
        <ContactSection selectedWork={contactWork} onBack={() => navigate('gallery')} />
      )}

      {screen === 'about' && (
        <>
          <AboutStrip />
          <ContactSection onBack={() => navigate('home')} />
        </>
      )}

      {screen === 'artists'       && <ArtistsPage onNavigate={navigate} />}
      {screen === 'announcements' && <AnnouncementsPage onNavigate={navigate} />}
      {screen === 'exhibitions'   && <ExhibitionsPage exhibitions={exhibitions} onNavigate={navigate} />}

      <Footer onNavigate={navigate} />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
