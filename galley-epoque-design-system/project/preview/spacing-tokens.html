<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F4EF; font-family: 'Jost', sans-serif; padding: 28px 32px; }
  .section { margin-bottom: 28px; }
  .section-title { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #8C8679; margin-bottom: 12px; }
  .space-row { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
  .space-bar  { background: #1A4D2E; height: 8px; border-radius: 1px; }
  .space-meta { font-size: 11px; color: #8C8679; font-family: monospace; min-width: 120px; }
</style>
</head>
<body>
  <div class="section">
    <div class="section-title">Spacing Scale — 8pt Grid</div>
    <div class="space-row"><div class="space-bar" style="width:4px;height:4px;border-radius:1px;"></div><div class="space-meta">--space-1 &nbsp; 4px</div></div>
    <div class="space-row"><div class="space-bar" style="width:8px;"></div><div class="space-meta">--space-2 &nbsp; 8px</div></div>
    <div class="space-row"><div class="space-bar" style="width:12px;"></div><div class="space-meta">--space-3 &nbsp; 12px</div></div>
    <div class="space-row"><div class="space-bar" style="width:16px;"></div><div class="space-meta">--space-4 &nbsp; 16px</div></div>
    <div class="space-row"><div class="space-bar" style="width:24px;"></div><div class="space-meta">--space-6 &nbsp; 24px</div></div>
    <div class="space-row"><div class="space-bar" style="width:32px;"></div><div class="space-meta">--space-8 &nbsp; 32px</div></div>
    <div class="space-row"><div class="space-bar" style="width:48px;"></div><div class="space-meta">--space-12 &nbsp;48px</div></div>
    <div class="space-row"><div class="space-bar" style="width:64px;"></div><div class="space-meta">--space-16 &nbsp;64px</div></div>
    <div class="space-row"><div class="space-bar" style="width:96px;"></div><div class="space-meta">--space-24 &nbsp;96px</div></div>
    <div class="space-row"><div class="space-bar" style="width:128px;"></div><div class="space-meta">--space-32 &nbsp;128px</div></div>
  </div>
</body>
</html>
