<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F4EF; font-family: 'Jost', sans-serif; padding: 28px 32px; }
  .scale-row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 12px; border-bottom: 1px solid #E0DDD7; padding-bottom: 12px; }
  .scale-row:last-child { border: none; margin-bottom: 0; }
  .meta { min-width: 80px; font-size: 10px; color: #C4BFB8; font-family: monospace; }
</style>
</head>
<body>
  <div class="scale-row"><div class="meta">80px / 5rem</div><div style="font-family:'Cormorant Garamond',serif;font-size:80px;font-weight:300;line-height:1;letter-spacing:-0.02em;color:#1A1A18;">Aa</div></div>
  <div class="scale-row"><div class="meta">60px / 3.75rem</div><div style="font-family:'Cormorant Garamond',serif;font-size:60px;font-weight:300;line-height:1;letter-spacing:-0.02em;color:#1A1A18;">Aa</div></div>
  <div class="scale-row"><div class="meta">48px / 3rem</div><div style="font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;line-height:1.1;color:#1A1A18;">Aa</div></div>
  <div class="scale-row"><div class="meta">36px / 2.25rem</div><div style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:400;color:#1A1A18;">Aa</div></div>
  <div class="scale-row"><div class="meta">30px / 1.875rem</div><div style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;color:#1A1A18;">Aa</div></div>
  <div class="scale-row"><div class="meta">24px / 1.5rem</div><div style="font-family:'Jost',sans-serif;font-size:24px;font-weight:400;color:#1A1A18;">Aa</div></div>
  <div class="scale-row"><div class="meta">20px / 1.25rem</div><div style="font-family:'Jost',sans-serif;font-size:20px;font-weight:400;color:#1A1A18;">Aa</div></div>
  <div class="scale-row"><div class="meta">16px / 1rem</div><div style="font-family:'Jost',sans-serif;font-size:16px;font-weight:400;color:#1A1A18;">Aa — body text</div></div>
  <div class="scale-row"><div class="meta">14px / .875rem</div><div style="font-family:'Jost',sans-serif;font-size:14px;font-weight:400;color:#8C8679;">Aa — caption</div></div>
  <div class="scale-row"><div class="meta">12px / .75rem</div><div style="font-family:'Jost',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;color:#8C8679;">LABEL / OVERLINE</div></div>
</body>
</html>
