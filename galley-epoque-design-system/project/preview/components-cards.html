<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,300;1,400&family=Jost:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F4EF; font-family: 'Jost', sans-serif; padding: 28px 32px; }
  .cards { display: flex; gap: 20px; flex-wrap: wrap; }
  .card { background: white; border-radius: 2px; box-shadow: 0 2px 8px rgba(26,26,24,0.08); overflow: hidden; width: 190px; transition: box-shadow 300ms cubic-bezier(0.25,0.46,0.45,0.94); }
  .card:hover { box-shadow: 0 8px 24px rgba(26,26,24,0.14); }
  .card-img { width: 100%; height: 140px; overflow: hidden; position: relative; background: #E0DDD7; }
  .card-img-inner { width: 100%; height: 100%; transition: transform 400ms cubic-bezier(0.25,0.46,0.45,0.94); }
  .card:hover .card-img-inner { transform: scale(1.04); }
  .mat { padding: 10px; background: white; }
  .card-body { padding: 12px 14px 14px; }
  .card-overline { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #8C8679; margin-bottom: 4px; }
  .card-title { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-style: italic; color: #1A1A18; line-height: 1.3; margin-bottom: 4px; }
  .card-meta { font-size: 11px; color: #C4BFB8; font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; }
  .card-price { font-family: 'Jost', sans-serif; font-size: 15px; font-weight: 500; color: #C9A84C; }
  .card-featured { border: 1px solid #C9A84C; }

  /* Placeholder art images */
  .art1 { background: linear-gradient(135deg, #4A7C59 0%, #1A4D2E 60%, #0E2D1A 100%); }
  .art2 { background: linear-gradient(160deg, #C9A84C 0%, #8B6B1A 70%); }
  .art3 { background: linear-gradient(135deg, #8C8679 0%, #3A3A37 100%); }
</style>
</head>
<body>
  <div class="cards">
    <!-- Standard card -->
    <div class="card">
      <div class="card-img">
        <div class="card-img-inner art1" style="width:100%;height:100%;"></div>
      </div>
      <div class="mat">
        <div class="card-body">
          <div class="card-overline">Photography</div>
          <div class="card-title">Coastal Light, No. 4</div>
          <div class="card-meta">GE-2024-0047</div>
          <div class="card-price">€ 1,200</div>
        </div>
      </div>
    </div>

    <!-- Featured card (gold border) -->
    <div class="card card-featured">
      <div class="card-img">
        <div class="card-img-inner art2" style="width:100%;height:100%;"></div>
      </div>
      <div class="mat">
        <div class="card-body">
          <div class="card-overline" style="color:#C9A84C;">Featured Work</div>
          <div class="card-title">Golden Hour Study</div>
          <div class="card-meta">GE-2024-0031</div>
          <div class="card-price">€ 3,400</div>
        </div>
      </div>
    </div>

    <!-- Sold out card -->
    <div class="card" style="opacity:0.65;">
      <div class="card-img" style="position:relative;">
        <div class="card-img-inner art3" style="width:100%;height:100%;"></div>
        <div style="position:absolute;top:10px;right:10px;background:rgba(26,26,24,0.75);color:white;font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:4px 8px;border-radius:999px;">Sold</div>
      </div>
      <div class="mat">
        <div class="card-body">
          <div class="card-overline">Painting</div>
          <div class="card-title">Evening Silence</div>
          <div class="card-meta">GE-2023-0019</div>
          <div class="card-price" style="color:#C4BFB8;">Sold</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
