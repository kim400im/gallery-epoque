<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F4EF; font-family: 'Jost', sans-serif; padding: 24px; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .swatch { flex: 1; border-radius: 2px; overflow: hidden; }
  .swatch-color { height: 72px; }
  .swatch-info { padding: 8px; background: white; }
  .swatch-name { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #1A1A18; }
  .swatch-hex  { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #8C8679; margin-top: 2px; }
  .swatch-role { font-size: 10px; color: #C4BFB8; margin-top: 1px; letter-spacing: 0.03em; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="swatch-color" style="background:#0E2D1A"></div>
    <div class="swatch-info">
      <div class="swatch-name">Green 900</div>
      <div class="swatch-hex">#0E2D1A</div>
      <div class="swatch-role">Deepest</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#1A4D2E"></div>
    <div class="swatch-info">
      <div class="swatch-name">Green 800</div>
      <div class="swatch-hex">#1A4D2E</div>
      <div class="swatch-role">Primary Brand</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#235E39"></div>
    <div class="swatch-info">
      <div class="swatch-name">Green 700</div>
      <div class="swatch-hex">#235E39</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#2E7048"></div>
    <div class="swatch-info">
      <div class="swatch-name">Green 600</div>
      <div class="swatch-hex">#2E7048</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#4A7C59"></div>
    <div class="swatch-info">
      <div class="swatch-name">Green 500</div>
      <div class="swatch-hex">#4A7C59</div>
      <div class="swatch-role">Secondary</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#6A9E78"></div>
    <div class="swatch-info">
      <div class="swatch-name">Green 400</div>
      <div class="swatch-hex">#6A9E78</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#7FB069"></div>
    <div class="swatch-info">
      <div class="swatch-name">Green 300</div>
      <div class="swatch-hex">#7FB069</div>
      <div class="swatch-role">Accent</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#A8C99A"></div>
    <div class="swatch-info">
      <div class="swatch-name">Green 200</div>
      <div class="swatch-hex">#A8C99A</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#D4E8CB"></div>
    <div class="swatch-info">
      <div class="swatch-name">Green 100</div>
      <div class="swatch-hex">#D4E8CB</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#EEF6E9; border: 1px solid #E0DDD7;"></div>
    <div class="swatch-info">
      <div class="swatch-name">Green 50</div>
      <div class="swatch-hex">#EEF6E9</div>
    </div>
  </div>
</div>
<div class="row">
  <div class="swatch">
    <div class="swatch-color" style="background:#8B6B1A"></div>
    <div class="swatch-info">
      <div class="swatch-name">Gold 700</div>
      <div class="swatch-hex">#8B6B1A</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#C9A84C"></div>
    <div class="swatch-info">
      <div class="swatch-name">Gold 500</div>
      <div class="swatch-hex">#C9A84C</div>
      <div class="swatch-role">Premium</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#E2C97A; border:1px solid #E0DDD7;"></div>
    <div class="swatch-info">
      <div class="swatch-name">Gold 300</div>
      <div class="swatch-hex">#E2C97A</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#F5EDD0; border:1px solid #E0DDD7;"></div>
    <div class="swatch-info">
      <div class="swatch-name">Gold 100</div>
      <div class="swatch-hex">#F5EDD0</div>
    </div>
  </div>
</div>
</body>
</html>
