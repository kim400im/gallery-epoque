<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F4EF; font-family: 'Jost', sans-serif; padding: 28px 32px; }
  .form-group { margin-bottom: 18px; }
  .form-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #5C5750; display: block; margin-bottom: 6px; }
  .form-input { width: 100%; max-width: 340px; background: white; border: 1px solid #E0DDD7; border-radius: 2px; padding: 11px 14px; font-family: 'Jost', sans-serif; font-size: 14px; color: #1A1A18; outline: none; transition: border-color 150ms; }
  .form-input:focus { border-color: #1A4D2E; box-shadow: 0 0 0 3px rgba(26,77,46,0.08); }
  .form-input::placeholder { color: #C4BFB8; }
  .form-input.error { border-color: #C0392B; }
  .form-hint { font-size: 12px; color: #8C8679; margin-top: 5px; }
  .form-error { font-size: 12px; color: #C0392B; margin-top: 5px; }
  textarea.form-input { min-height: 96px; resize: vertical; }
</style>
</head>
<body>
  <div class="form-group">
    <label class="form-label">Your Name</label>
    <input class="form-input" type="text" placeholder="e.g. Sophie Martin">
  </div>
  <div class="form-group">
    <label class="form-label">Email Address</label>
    <input class="form-input" type="email" placeholder="you@example.com">
    <div class="form-hint">We will respond within 24 hours.</div>
  </div>
  <div class="form-group">
    <label class="form-label">Email Address (Error)</label>
    <input class="form-input error" type="email" value="not-an-email">
    <div class="form-error">Please enter a valid email address.</div>
  </div>
  <div class="form-group">
    <label class="form-label">Message</label>
    <textarea class="form-input" placeholder="I am interested in…"></textarea>
  </div>
</body>
</html>
